volumes:
  mongo-data:

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    restart: unless-stopped
    ports:
      - '4180:4180'
    command:
      - --provider=github
      - --github-org=wafflestudio
      - --upstream=http://app:3000
      - --http-address=0.0.0.0:4180
      - --redirect-url=http://localhost:4180/oauth2/callback
      - --email-domain=*
      - --cookie-secure=false
    environment:
      OAUTH2_PROXY_CLIENT_ID: '${GITHUB_CLIENT_ID}'
      OAUTH2_PROXY_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET}'
      OAUTH2_PROXY_COOKIE_SECRET: '${OAUTH2_PROXY_COOKIE_SECRET}'
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    environment:
      NUXT_MONGODB_URI: 'mongodb://root:example@mongo:27017'
      NUXT_PUBLIC_DEMO_WORKSPACE_TOKEN: '${DEMO_WORKSPACE_TOKEN:-}'

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: slack

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: 'mongodb://root:example@mongo:27017/'
